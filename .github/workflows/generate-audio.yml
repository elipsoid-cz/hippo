name: Generate Audio

on:
  workflow_dispatch:
    inputs:
      set_id:
        description: 'Set ID (YYYY-MM-DD)'
        required: true
        type: string
      word:
        description: 'Jedno slovo k přegenerování (prázdné = celý set)'
        required: false
        type: string
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate audio
        run: |
          if [ -n "$WORD" ]; then
            node scripts/generate-audio.js --set "$SET_ID" --word "$WORD" --force --voice Puck
          else
            node scripts/generate-audio.js --set "$SET_ID" --voice Puck
          fi
        env:
          SET_ID: ${{ inputs.set_id }}
          WORD: ${{ inputs.word }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Pull latest changes before commit
        run: git stash && git pull --rebase origin main && git stash pop || true

      - name: Commit and push audio files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "feat: generování audia pro set ${{ inputs.set_id }}"
          file_pattern: "english/spelling-bees/${{ inputs.set_id }}/audio/* english/spelling-bees/shared/words.js"
