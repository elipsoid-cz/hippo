name: Generate Audio

on:
  workflow_dispatch:
    inputs:
      set_id:
        description: 'Set ID (YYYY-MM-DD)'
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate audio
        run: node scripts/generate-audio.js --set "${{ inputs.set_id }}" --voice Puck
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Pull latest changes before commit
        run: git pull --rebase origin main

      - name: Commit and push audio files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "feat: generování audia pro set ${{ inputs.set_id }}"
          file_pattern: "english/spelling-bees/${{ inputs.set_id }}/audio/* english/spelling-bees/shared/words.js"
